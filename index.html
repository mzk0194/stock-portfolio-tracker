<!DOCTYPE html>
<html>
<head>
    <title>Stock Portfolio Tracker</title>

    <style>

body{
    font-family: Arial;
    background-color:#f4f6f9;
    padding:30px;
}

h1{
    text-align:center;
}

#stockList{
    list-style:none;
    padding:0;
}

li{
    background:white;
    margin:10px 0;
    padding:15px;
    border-radius:10px;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

button{
    margin-top:10px;
    margin-right:5px;
    padding:5px 10px;
}

.profitPositive{
    color:green;
    font-weight:bold;
}

.profitNegative{
    color:red;
    font-weight:bold;
}

</style>
</head>
<body>

    <h1>Stock Portfolio Tracker</h1>

    <p>
        Stock Name:
        <input type="text" id="stockName">
    </p>

    <p>
        Shares:
        <input type="number" id="shares">
    </p>

    <p>
        Price:
        <input type="number" id="price">
    </p>

    <button id="getPriceButton">Get Current Price</button>

    <button id="addButton">Add Stock</button>

    <button id="cancelEditButton" style="display:none;">Cancel</button>

    <button id="sortHigh">Sort by Highest Profit</button>
    
    <button id="sortLow">Sort by Lowest Profit</button>

    <ul id="stockList"></ul>

    <p id="totalValue">Total Value: $0</p>

    <script src="script.js"></script>

</body>

</html>
